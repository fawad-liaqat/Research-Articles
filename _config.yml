# Jekyll Configuration — Research Articles
# GitHub Pages: https://fawad-liaqat.github.io/Research-Articles/

# ── Site Identity ──────────────────────────────────────────
title:       "Research Articles"
description: "Analysis on economics, technology, and human behavior."
author:      "Fawad Liaqat"
email:       "fawadliaqat666@gmail.com"

# ── URLs ───────────────────────────────────────────────────
url:         "https://fawad-liaqat.github.io"
baseurl:     "/Research-Articles"

# ── Portfolio link (update this once you have your URL) ────
portfolio_url: "https://fawad-liaqat.netlify.app/"

# ── Build Settings ─────────────────────────────────────────
# No external theme — custom layouts in _layouts/ are used
markdown:    kramdown
highlighter: rouge

kramdown:
  input:           GFM
  hard_wrap:       false
  syntax_highlighter: rouge

# ── Defaults ───────────────────────────────────────────────
defaults:
  - scope:
      path: "articles"
      type: "pages"
    values:
      layout: article

# ── Exclude from build ─────────────────────────────────────
exclude:
  - README.md
  - DEPLOYMENT.md
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/
  - .git/
  - .gitignore
